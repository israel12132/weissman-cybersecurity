# Weissman production — Nginx reverse proxy → Rust on 127.0.0.1:PORT
# The upstream port MUST match `PORT` in weissman-server's environment (see `.env`; default: 8080).
# After editing PORT in .env, run: sudo bash deploy/fix-weissman-502.sh
#
# Prerequisites: certbot (Let's Encrypt) or another TLS terminator; this example uses certbot paths.
# Install websocket map once (must live in http context):
#   sudo cp deploy/nginx-snippet-websocket-map.conf /etc/nginx/conf.d/00-websocket-map.conf
#
# Install site:
#   sudo cp deploy/nginx-weissman.conf /etc/nginx/sites-available/weissman
#   sudo ln -sf /etc/nginx/sites-available/weissman /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: certbot standalone (stop nginx first, then start after certs exist):
#   sudo systemctl stop nginx
#   sudo certbot certonly --standalone -d weissmancyber.com -d www.weissmancyber.com
#   sudo systemctl start nginx

upstream weissman_backend {
    # Must match `PORT` in weissman-server `.env` (default: 8080).
    # Docker Compose and Rust default both use 8080.
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name weissmancyber.com www.weissmancyber.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name weissmancyber.com www.weissmancyber.com;

    # Certificate must include SAN for both apex and www (e.g. certbot -d weissmancyber.com -d www.weissmancyber.com)
    ssl_certificate /etc/letsencrypt/live/weissmancyber.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weissmancyber.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Optional; certbot may create this path:
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Large report / export uploads if you increase client limits in the app
    client_max_body_size 64m;

    location / {
        proxy_pass http://weissman_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # SSE / long-lived streams
        proxy_buffering off;
        proxy_cache off;
    }
}
