# Weissman Phase 2: PostgreSQL + Rust API + Nginx (SPA + /api /ws proxy on :80).
# Run from repo root: docker compose up --build
#
# URLs: http://localhost/ → Command Center. Migrations run once at backend start when WEISSMAN_MIGRATE_URL is set.
#
# DB roles (from sqlx migrations): postgres superuser runs migrations; app uses weissman_app (RLS); auth uses weissman_auth (BYPASSRLS).
#
# SECRETS: ALL sensitive values must be set via a .env file or the host environment.
# Copy .env.example to .env, fill in every variable, then run: docker compose up --build
# Never commit a populated .env file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: weissman
    volumes:
      - weissman_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weissman"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    image: weissman-backend:local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEISSMAN_AUTH_DATABASE_URL: ${WEISSMAN_AUTH_DATABASE_URL}
      WEISSMAN_MIGRATE_URL: ${WEISSMAN_MIGRATE_URL}
      WEISSMAN_PUBLIC_BASE_URL: ${WEISSMAN_PUBLIC_BASE_URL:-http://localhost}
      WEISSMAN_JWT_SECRET: ${WEISSMAN_JWT_SECRET}
      # Optional: require X-Weissman-Destructive-Confirm header (exact match) for Auto-Heal, containment execute, deception cloud deploy
      WEISSMAN_DESTRUCTIVE_CONFIRM_SECRET: ${WEISSMAN_DESTRUCTIVE_CONFIRM_SECRET:-}
      WEISSMAN_ADMIN_EMAIL: ${WEISSMAN_ADMIN_EMAIL}
      WEISSMAN_ADMIN_PASSWORD: ${WEISSMAN_ADMIN_PASSWORD}
      # Optional first-boot master (`db::MASTER_BOOTSTRAP_EMAIL`); hash at runtime from password or inject bcrypt hash
      WEISSMAN_MASTER_BOOTSTRAP_PASSWORD: ${WEISSMAN_MASTER_BOOTSTRAP_PASSWORD:-}
      WEISSMAN_MASTER_BOOTSTRAP_BCRYPT: ${WEISSMAN_MASTER_BOOTSTRAP_BCRYPT:-}
      PORT: "8000"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # PORT env var defaults to 8000 - see backend environment section
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/config/public"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Async jobs (scan pipelines, engines off the HTTP request thread). Same image as backend.
  worker:
    image: weissman-backend:local
    command: ["/usr/local/bin/weissman-worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEISSMAN_AUTH_DATABASE_URL: ${WEISSMAN_AUTH_DATABASE_URL}
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # Check that weissman-worker binary is running (not just any matching process)
      test: ["CMD-SHELL", "pgrep -x weissman-worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  gateway:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/command-center/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  weissman_pg:
